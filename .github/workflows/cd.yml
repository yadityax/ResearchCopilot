name: CD — Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        id: meta
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/researchcopilot-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/researchcopilot-backend:${{ github.sha }}

  deploy:
    needs: build-and-push
    # Runs on your self-hosted server where kind + kubectl are installed
    # Setup: Settings → Actions → Runners → New self-hosted runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Load image into kind
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/researchcopilot-backend:latest
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/researchcopilot-backend:latest \
            --name researchcopilot

      - name: Apply k8s manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Rolling restart
        run: |
          kubectl rollout restart deployment/researchcopilot-backend -n researchcopilot
          kubectl rollout status deployment/researchcopilot-backend -n researchcopilot --timeout=120s

      - name: Smoke test
        run: |
          sleep 5
          curl -sf http://10.6.0.69:30800/health | grep '"status":"ok"'
          echo "Deploy successful"
