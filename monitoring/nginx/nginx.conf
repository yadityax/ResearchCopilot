server {
    listen 80;

    # ── Landing dashboard (served from file) ─────────────────────────────────
    location = / {
        root  /etc/nginx/html;
        index index.html;
    }

    # FastAPI Swagger UI fetches /openapi.json at root — proxy it
    location = /openapi.json {
        proxy_pass http://host.docker.internal:30800/openapi.json;
    }

    # ── FastAPI Backend (k8s NodePort 30800) ─────────────────────────────────
    location /api/ {
        proxy_pass         http://host.docker.internal:30800/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 600s;
    }

    # ── Grafana ───────────────────────────────────────────────────────────────
    location /grafana/ {
        proxy_pass         http://grafana:3000/grafana/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── Prometheus ────────────────────────────────────────────────────────────
    location /prometheus/ {
        proxy_pass         http://prometheus:9090/prometheus/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── MLflow ────────────────────────────────────────────────────────────────
    location /mlflow/ {
        proxy_pass         http://mlflow:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
