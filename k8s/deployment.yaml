apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchcopilot-backend
  namespace: researchcopilot
  labels:
    app: researchcopilot-backend
spec:
  replicas: 2                  # start with 2 pods
  selector:
    matchLabels:
      app: researchcopilot-backend
  template:
    metadata:
      labels:
        app: researchcopilot-backend
    spec:
      containers:
        - name: backend
          image: researchcopilot-backend:latest
          imagePullPolicy: Never       # use locally built image
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: researchcopilot-config
          resources:
            requests:
              cpu: "500m"              # 0.5 CPU to start
              memory: "1Gi"
            limits:
              cpu: "2000m"             # max 2 CPUs per pod
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
