services:
  # ── ChromaDB (Vector Database) ───────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: researchcopilot_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - researchcopilot_net
    restart: unless-stopped

  # ── DynamoDB Local (Metadata) ────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: researchcopilot_dynamodb
    ports:
      - "8002:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    networks:
      - researchcopilot_net
    restart: unless-stopped

  # ── MLflow (Experiment Tracking) ─────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: researchcopilot_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    volumes:
      - mlflow_data:/mlflow
    networks:
      - researchcopilot_net
    restart: unless-stopped

  # ── Prometheus (Metrics Scraper) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: researchcopilot_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.external-url=http://10.6.0.69:9999/prometheus"
      - "--web.route-prefix=/prometheus"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - researchcopilot_net
    restart: unless-stopped

  # ── Grafana (Dashboards) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: researchcopilot_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=researchcopilot
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://10.6.0.69:9999/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http
      - GF_SECURITY_COOKIE_SECURE=false
      - GF_SECURITY_COOKIE_SAMESITE=lax
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - researchcopilot_net
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Monitor Hub (Nginx reverse proxy) ────────────────────────
  hub:
    image: nginx:alpine
    container_name: researchcopilot_hub
    ports:
      - "9999:80"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./monitoring/nginx/index.html:/etc/nginx/html/index.html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - researchcopilot_net
    depends_on:
      - prometheus
      - grafana
      - mlflow
    restart: unless-stopped

volumes:
  chroma_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  researchcopilot_net:
    driver: bridge
